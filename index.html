<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Ayush Industrial | Center of Excellence in Automation & Industry 4.0</title>
    <meta name="title" content="Ayush Industrial | Center of Excellence in Automation & Industry 4.0" />
    <meta name="description" content="India's premier industrial training institute specializing in PLC, SCADA, Industrial Robotics, IIoT, and Advanced Additive Manufacturing." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f172a" /> <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
      /* Prevent layout shift and set industrial base color */
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a; /* Slate 900 */
        font-family: 'Inter', sans-serif;
      }
      
      #root {
        min-height: 100vh;
      }

      /* Simple industrial loader for slow connections */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      .loader-bar {
        width: 40px;
        height: 4px;
        background: #f97316; /* Orange 500 */
        animation: loading 1.5s infinite ease-in-out;
      }

      @keyframes loading {
        0% { transform: scaleX(0.1); opacity: 0.5; }
        50% { transform: scaleX(1.5); opacity: 1; }
        100% { transform: scaleX(0.1); opacity: 0.5; }
      }
    </style>
  </head>

  <body>
    <div id="initial-loader">
      <div class="loader-bar"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/client/main.tsx"></script>

    <script>
      // Remove loader once React hydration is likely starting
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
